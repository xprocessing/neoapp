spring:
  application:
    name: neoapp-backend
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

server:
  port: 8080

# JWT 配置
jwt:
  secret: NeoAppSecretKey2026ForJwtTokenGenerationAndValidation
  expiration: 86400000  # 24小时

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.neoapp.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: is_deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
#   log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 开发调试时开启

---

