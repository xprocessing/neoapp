spring:
  application:
    name: neoapp-backend
  profiles:
    active: dev

server:
  port: 8080
  servlet:
    context-path: /

# JWT 配置
jwt:
  secret: NeoAppSecretKey2026ForJwtTokenGenerationAndValidation
  expiration: 86400000

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.neoapp.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: is_deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
